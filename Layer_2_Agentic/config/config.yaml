# =============================================================================
# AGENTIC REASONING SYSTEM CONFIGURATION
# =============================================================================
# Multi-agent LLM document processing system configuration

# Configuration
config_file: config/config.yaml

# Logging
log_dir: config/logs/
log_file: app.log
log_level: info

# Model Storage
model_path: models/

# Databases
agentic_db: data/database/agentic.db      # Workflow database
harvested_db: data/database/harvested.db # Product database (335 products, 69 families)
temp_db: data/database/temp.db           # Temporary processing database

# Data Directories
data_dir: ../data/
pdf_dir: ../data/pdfs/
extracted_image_dir: ../data/images/
exports_dir: ../data/exports/

# LLM Models - Three-tier architecture
llms:
  basic:
    model: llama3.2:latest
    temperature: 0.0
  
  reasoning:
    model: llama3.2:latest # Switched from llama3.2 for stability
    temperature: 0.0
  
  multimodal:
    model: llava:latest
    temperature: 0.0
