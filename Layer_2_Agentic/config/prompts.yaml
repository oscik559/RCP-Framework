      STANDARD TYPES:
      1. ISO: International product specifications and testing standards
      2. SAE: Automotive and engineering standards
      3. DIN: German industrial standards
      4. ASTM: Material and testing standards
      5. CONNECTION: Thread and interface types (BSP, NPT, metric, etc.)
      
      GUIDELINES:
      - Provide standard name and description
