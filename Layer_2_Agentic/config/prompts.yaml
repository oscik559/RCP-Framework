  json_instruction: |
    Respond in valid JSON format only. Do not include any other text.

  # Confidence scoring instruction for validation prompts
  confidence_instruction: |
    Include a confidence score (0.0 to 1.0) in your response.

# ─── JSON Processing Patterns ──────────────────────────────────────────
# Regex patterns for cleaning and validating LLM JSON responses
# Used by prompt_loader.py for response post-processing
json_patterns:
  code_block_removal: "```json\\s*|```\\s*$"    # Remove JSON code block markers
  newline_cleanup: "\\\\n|\\n+"                # Clean up newline characters
  control_chars: "[\\x00-\\x1f\\x7f-\\x9f]"    # Remove control characters
  smart_quotes: "[\u201c\u201d]"               # Replace smart quotes with standard quotes