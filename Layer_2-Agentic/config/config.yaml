# AGENTIC REASONING SYSTEM CONFIGURATION
# ═══════════════════════════════════════════════════════════════════════
# 
# Main configuration file for the multi-agent LLM document processing system.
# Controls LLM models, database paths, logging, and system parameters.
#
# Configuration Categories:
# - LLM Models: Ollama model configuration by capability tier
# - Databases: SQLite database paths for different data types  
# - Logging: Debug output and file logging configuration
# - Directories: Data storage and processing directories
# - System: Performance limits and timeout configurations
# 
# Usage:
# - Loaded automatically by config_loader.py at startup
# - Accessed via CONFIG dictionary throughout the application
# - Environment-specific overrides supported via env variables
# ═══════════════════════════════════════════════════════════════════════






# ─── Configuration Paths ────────────────────────────────────────────────
# System configuration file location for dynamic reloading and validation
config_file: config/config.yaml

# ─── Log Paths ──────────────────────────────────────────────────────────
# Application logging configuration for debug output and error tracking
log_dir: config/logs/   # Directory for log files (inside Layer_2-Agentic)
log_file: app.log                         # Main application log file
log_level: info                           # Logging verbosity (debug/info/warning/error)

# ─── Model Paths ───────────────────────────────────────────────────────
model_path: models/


# ─── Databases ────────────────────────────────────
agentic_db: data/database/agentic.db
harvested_db: data/database/harvested.db
temp_db: data/database/temp.db

# ─── Data Directories ──────────────────────────────────────────────────
# File system paths for document processing and storage
data_dir: ../data/                           # Root data directory containing all processed files
pdf_dir: ../data/pdfs/                       # Source PDF documents for table extraction
extracted_image_dir: ../data/images/         # Extracted images, tables, and diagrams
exports_dir: ../data/exports/                # Exported data (CSV, XLSX)


# ─── LLM Levels ──────────────────────────────────────────────────
# Ollama model configuration organized by capability tiers
# Three-tier architecture for optimal performance vs. quality trade-offs
llms:
  # Basic tier: Fast responses for simple tasks (keyword generation, validation)
  # Used for: Quick classifications, simple extractions, boolean validations
  basic:
    model: llama3.2:latest                  # Llama 3.2 for fast local inference
    temperature: 0.0                        # Deterministic output for consistency

  # Reasoning tier: Complex analysis and strategy selection
  # Used for: Strategy planning, goal validation, complex decision making, technical analysis
  reasoning:
    model: deepseek-r1:latest               # DeepSeek-R1 for advanced reasoning with chain-of-thought
    temperature: 0.0                        # Deterministic for strategy selection

  # Multimodal tier: Image and table processing capabilities  
  # Used for: PDF image analysis, table extraction, visual data processing
  multimodal:
    model: llava:latest                     # Vision-capable model for image analysis
    temperature: 0.0                        # Consistent output for visual processing
