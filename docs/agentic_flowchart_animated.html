<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agentic Control Loop</title>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #E8E7E0;
    display: flex; justify-content: center; align-items: flex-start;
    padding: 44px 24px 52px; min-height: 100vh;
  }
  .card {
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 8px 48px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
    padding: 36px 32px 32px;
  }
  svg { display: block; width: 100%; max-width: 820px; }

  /* Animated dash directions */
  @keyframes dash-fwd { from { stroke-dashoffset: 18; } to { stroke-dashoffset: 0; } }
  @keyframes dash-rev { from { stroke-dashoffset: 0;  } to { stroke-dashoffset: 18; } }

  /* Main flow: flowing solid-looking dashes */
  .fwd { stroke-dasharray: 7 3; animation: dash-fwd 0.55s linear infinite; }
  /* Feedback loops: reverse flowing dashes */
  .rev { stroke-dasharray: 5 4; animation: dash-rev 0.80s linear infinite; }
  /* DB connections: slower dotted */
  .dot { stroke-dasharray: 3 4; animation: dash-fwd 1.00s linear infinite; }

  /* Node hover */
  .node { cursor: pointer; }
  .node > rect,
  .node > ellipse,
  .node > polygon {
    transition: filter 0.16s ease, transform 0.16s ease;
    transform-box: fill-box;
    transform-origin: center;
  }
  .node:hover > rect,
  .node:hover > ellipse,
  .node:hover > polygon {
    filter: brightness(1.08) drop-shadow(0 3px 7px rgba(0,0,0,0.20));
    transform: scale(1.03);
  }
</style>
</head>
<body>
<div class="card">
<svg viewBox="0 0 820 870" xmlns="http://www.w3.org/2000/svg">
<defs>
  <filter id="sh">
    <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000022"/>
  </filter>

  <!-- Arrow markers, colour-matched -->
  <marker id="a-teal"  viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M1.5 2L8.5 5L1.5 8" fill="none" stroke="#1E8C7E" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="a-pink"  viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M1.5 2L8.5 5L1.5 8" fill="none" stroke="#C24A4A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="a-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M1.5 2L8.5 5L1.5 8" fill="none" stroke="#BE5E1E" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="a-dark"  viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M1.5 2L8.5 5L1.5 8" fill="none" stroke="#333" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="a-gray"  viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M1.5 2L8.5 5L1.5 8" fill="none" stroke="#777" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="a-blue"  viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M1.5 2L8.5 5L1.5 8" fill="none" stroke="#3E8EB8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ══════════════════════════════════════════
     SYSTEM BOUNDARY
══════════════════════════════════════════ -->
<rect x="238" y="74" width="352" height="684" rx="14"
      fill="#F0EFE9" stroke="#C0BFB8" stroke-width="1.2"
      stroke-dasharray="9 5" opacity="0.75"/>


<!-- ══════════════════════════════════════════
     MAIN FLOW  (top → bottom, all vertical at x=414)
══════════════════════════════════════════ -->

<!-- QUERY -->
<g class="node" filter="url(#sh)">
  <ellipse cx="414" cy="44" rx="74" ry="28"
           fill="#F5AA73" stroke="#BE5E1E" stroke-width="2"/>
  <text font-family="'Patrick Hand',cursive" font-size="19" font-weight="700" font-style="italic"
        fill="#3A1806" x="414" y="44" text-anchor="middle" dominant-baseline="central">Query</text>
</g>

<!-- Query → Goal Definition -->
<line class="fwd" x1="414" y1="72" x2="414" y2="91"
      stroke="#1E8C7E" stroke-width="2.2" marker-end="url(#a-teal)"/>

<!-- GOAL DEFINITION  ─────────────────────── -->
<!-- rect: x=302 y=93 w=224 h=66   cx=414 cy=126   left=302 right=526 -->
<g class="node" filter="url(#sh)">
  <rect x="302" y="93" width="224" height="66" rx="10"
        fill="#72CCB6" stroke="#1E8C7E" stroke-width="2"/>
  <text font-family="'Patrick Hand',cursive" font-size="17" font-weight="700" font-style="italic"
        fill="#0A3326" x="414" y="113" text-anchor="middle" dominant-baseline="central">Goal</text>
  <text font-family="'Patrick Hand',cursive" font-size="17" font-weight="700" font-style="italic"
        fill="#0A3326" x="414" y="135" text-anchor="middle" dominant-baseline="central">Definition</text>
</g>

<!-- Goal Definition → Strategy Selection -->
<line class="fwd" x1="414" y1="159" x2="414" y2="185"
      stroke="#1E8C7E" stroke-width="2.2" marker-end="url(#a-teal)"/>

<!-- STRATEGY SELECTION  ─────────────────── -->
<!-- rect: x=302 y=187 w=224 h=66   cx=414 cy=220   left=302 right=526 -->
<g class="node" filter="url(#sh)">
  <rect x="302" y="187" width="224" height="66" rx="10"
        fill="#72CCB6" stroke="#1E8C7E" stroke-width="2"/>
  <text font-family="'Patrick Hand',cursive" font-size="17" font-weight="700" font-style="italic"
        fill="#0A3326" x="414" y="207" text-anchor="middle" dominant-baseline="central">Strategy</text>
  <text font-family="'Patrick Hand',cursive" font-size="17" font-weight="700" font-style="italic"
        fill="#0A3326" x="414" y="229" text-anchor="middle" dominant-baseline="central">Selection</text>
</g>

<!-- Strategy Selection → Function Execution -->
<line class="fwd" x1="414" y1="253" x2="414" y2="279"
      stroke="#1E8C7E" stroke-width="2.2" marker-end="url(#a-teal)"/>

<!-- FUNCTION EXECUTION  (dashed border)  ── -->
<!-- rect: x=288 y=281 w=252 h=66   cx=414 cy=314   left=288 right=540 -->
<g class="node" filter="url(#sh)">
  <rect x="288" y="281" width="252" height="66" rx="10"
        fill="#72CCB6" stroke="#1E8C7E" stroke-width="2.2" stroke-dasharray="8 4"/>
  <text font-family="'Patrick Hand',cursive" font-size="17" font-weight="700" font-style="italic"
        fill="#0A3326" x="414" y="301" text-anchor="middle" dominant-baseline="central">Function</text>
  <text font-family="'Patrick Hand',cursive" font-size="17" font-weight="700" font-style="italic"
        fill="#0A3326" x="414" y="323" text-anchor="middle" dominant-baseline="central">Execution</text>
</g>

<!-- Function Execution → Function Validation -->
<line class="fwd" x1="414" y1="347" x2="414" y2="371"
      stroke="#1E8C7E" stroke-width="2.2" marker-end="url(#a-teal)"/>

<!-- FUNCTION VALIDATION  (diamond)  ─────── -->
<!-- centre (414, 424)  hw=90  hh=53           -->
<!-- pts: top(414,371) R(504,424) bot(414,477) L(324,424) -->
<g class="node" filter="url(#sh)">
  <polygon points="414,371 504,424 414,477 324,424"
           fill="#F9A8A8" stroke="#C24A4A" stroke-width="2"/>
  <text font-family="'Patrick Hand',cursive" font-size="16" font-weight="700" font-style="italic"
        fill="#420C0C" x="414" y="414" text-anchor="middle" dominant-baseline="central">Function</text>
  <text font-family="'Patrick Hand',cursive" font-size="16" font-weight="700" font-style="italic"
        fill="#420C0C" x="414" y="434" text-anchor="middle" dominant-baseline="central">Validation</text>
</g>

<!-- Function Validation → Strategy Validation -->
<line class="fwd" x1="414" y1="479" x2="414" y2="503"
      stroke="#C24A4A" stroke-width="2.2" marker-end="url(#a-pink)"/>

<!-- STRATEGY VALIDATION  (diamond)  ─────── -->
<!-- centre (414, 556)  hw=90  hh=53           -->
<!-- pts: top(414,503) R(504,556) bot(414,609) L(324,556) -->
<g class="node" filter="url(#sh)">
  <polygon points="414,503 504,556 414,609 324,556"
           fill="#F9A8A8" stroke="#C24A4A" stroke-width="2"/>
  <text font-family="'Patrick Hand',cursive" font-size="16" font-weight="700" font-style="italic"
        fill="#420C0C" x="414" y="546" text-anchor="middle" dominant-baseline="central">Strategy</text>
  <text font-family="'Patrick Hand',cursive" font-size="16" font-weight="700" font-style="italic"
        fill="#420C0C" x="414" y="566" text-anchor="middle" dominant-baseline="central">Validation</text>
</g>

<!-- Strategy Validation → Goal Validation -->
<line class="fwd" x1="414" y1="611" x2="414" y2="631"
      stroke="#C24A4A" stroke-width="2.2" marker-end="url(#a-pink)"/>

<!-- GOAL VALIDATION  (diamond)  ─────────── -->
<!-- centre (414, 684)  hw=90  hh=53           -->
<!-- pts: top(414,631) R(504,684) bot(414,737) L(324,684) -->
<g class="node" filter="url(#sh)">
  <polygon points="414,631 504,684 414,737 324,684"
           fill="#F9A8A8" stroke="#C24A4A" stroke-width="2"/>
  <text font-family="'Patrick Hand',cursive" font-size="16" font-weight="700" font-style="italic"
        fill="#420C0C" x="414" y="674" text-anchor="middle" dominant-baseline="central">Goal</text>
  <text font-family="'Patrick Hand',cursive" font-size="16" font-weight="700" font-style="italic"
        fill="#420C0C" x="414" y="694" text-anchor="middle" dominant-baseline="central">Validation</text>
</g>

<!-- Goal Validation → Result -->
<line class="fwd" x1="414" y1="739" x2="414" y2="763"
      stroke="#BE5E1E" stroke-width="2.2" marker-end="url(#a-amber)"/>

<!-- RESULT -->
<g class="node" filter="url(#sh)">
  <ellipse cx="414" cy="791" rx="74" ry="28"
           fill="#F5AA73" stroke="#BE5E1E" stroke-width="2"/>
  <text font-family="'Patrick Hand',cursive" font-size="19" font-weight="700" font-style="italic"
        fill="#3A1806" x="414" y="791" text-anchor="middle" dominant-baseline="central">Result</text>
</g>


<!-- ══════════════════════════════════════════
     FEEDBACK LOOPS  (solid dark, all orthogonal H/V)
══════════════════════════════════════════ -->

<!--
  Loop 1 — "call next function"
  FV left (324,424) → L to x=218 → U to y=314 (FE centre) → R to FE left (288,314)
-->
<path class="rev"
      d="M324 424 L218 424 L218 314 L288 314"
      fill="none" stroke="#333" stroke-width="1.9"
      marker-end="url(#a-dark)"/>
<text font-family="'Patrick Hand',cursive" font-size="11.5" fill="#555"
      x="186" y="378" text-anchor="middle">call next</text>
<text font-family="'Patrick Hand',cursive" font-size="11.5" fill="#555"
      x="186" y="393" text-anchor="middle">function</text>

<!--
  Loop 2 — "try another strategy"
  SV right (504,556) → R to x=632 → U to y=220 (SS centre) → L to SS right (526,220)
  ─ the vertical segment at x=632 passes alongside the Agentic DB dashed box
-->
<path class="rev"
      d="M504 556 L632 556 L632 220 L526 220"
      fill="none" stroke="#333" stroke-width="1.9"
      marker-end="url(#a-dark)"/>
<!-- label sits between system boundary right (590) and the rail (632) -->
<text font-family="'Patrick Hand',cursive" font-size="11.5" fill="#555"
      x="611" y="414" text-anchor="middle">try another</text>
<text font-family="'Patrick Hand',cursive" font-size="11.5" fill="#555"
      x="611" y="429" text-anchor="middle">strategy</text>

<!--
  Loop 3 — "redefine goal"
  GV left (324,684) → L to x=156 → U to y=126 (GD centre) → R to GD left (302,126)
-->
<path class="rev"
      d="M324 684 L156 684 L156 126 L302 126"
      fill="none" stroke="#333" stroke-width="1.9"
      marker-end="url(#a-dark)"/>
<text font-family="'Patrick Hand',cursive" font-size="11.5" fill="#555"
      x="122" y="436" text-anchor="middle">redefine</text>
<text font-family="'Patrick Hand',cursive" font-size="11.5" fill="#555"
      x="122" y="451" text-anchor="middle">goal</text>


<!-- ══════════════════════════════════════════
     LEFT DATABASES
     Harvested DB: body y=301-353  (cx=100, top-cap cy=301, bot-cap cy=353)
     Temporary DB: body y=406-452  (cx=100, top-cap cy=406, bot-cap cy=452)
══════════════════════════════════════════ -->

<!-- Dashed enclosure around both left DBs -->
<rect x="34" y="278" width="136" height="200" rx="8"
      fill="none" stroke="#ABABAB" stroke-width="1.1" stroke-dasharray="7 4"/>

<!-- Harvested database (warm grey cylinder) -->
<g class="node" filter="url(#sh)">
  <rect x="52" y="301" width="96" height="52" fill="#DDDAD2" stroke="#9B9690" stroke-width="1.3"/>
  <ellipse cx="100" cy="353" rx="48" ry="13" fill="#CFCCC4" stroke="#9B9690" stroke-width="1.3"/>
  <ellipse cx="100" cy="301" rx="48" ry="13" fill="#EAE7DF" stroke="#9B9690" stroke-width="1.3"/>
  <text font-family="'Patrick Hand',cursive" font-size="11.5" font-style="italic" fill="#4A4840"
        x="100" y="319" text-anchor="middle" dominant-baseline="central">Harvested</text>
  <text font-family="'Patrick Hand',cursive" font-size="11.5" font-style="italic" fill="#4A4840"
        x="100" y="337" text-anchor="middle" dominant-baseline="central">database</text>
</g>

<!-- Vertical dotted arrow: Harvested DB bottom → Temporary DB top
     Harvested bot-cap tip = 353+13=366;  Temp top-cap tip = 406-13=393  -->
<line class="dot" x1="100" y1="367" x2="100" y2="392"
      stroke="#888" stroke-width="1.3" marker-end="url(#a-gray)"/>

<!-- Temporary database (soft blue cylinder) -->
<g class="node" filter="url(#sh)">
  <rect x="52" y="406" width="96" height="46" fill="#A8D9F5" stroke="#3E8EB8" stroke-width="1.3"/>
  <ellipse cx="100" cy="452" rx="48" ry="13" fill="#95CCEC" stroke="#3E8EB8" stroke-width="1.3"/>
  <ellipse cx="100" cy="406" rx="48" ry="13" fill="#BADEF8" stroke="#3E8EB8" stroke-width="1.3"/>
  <text font-family="'Patrick Hand',cursive" font-size="11.5" font-style="italic" fill="#133E5C"
        x="100" y="423" text-anchor="middle" dominant-baseline="central">Temporary</text>
  <text font-family="'Patrick Hand',cursive" font-size="11.5" font-style="italic" fill="#133E5C"
        x="100" y="440" text-anchor="middle" dominant-baseline="central">database</text>
</g>

<!--
  Harvested DB → Function Execution
  Two horizontal dotted arrows.
  DB right edge = 148.  FE left = 288.  FE y range 281-347.
  DB body y range 301-353 → overlap with FE at 301-347. Use y=313 and y=331.
-->
<line class="dot" x1="148" y1="313" x2="288" y2="313"
      stroke="#9B9690" stroke-width="1.3" marker-end="url(#a-gray)"/>
<line class="dot" x1="148" y1="331" x2="288" y2="331"
      stroke="#9B9690" stroke-width="1.3" marker-end="url(#a-gray)"/>

<!--
  Temporary DB → Function Execution
  Temp DB is below FE, so route: right → up → right (orthogonal L-route).
  Exit (148, 422)  →  R to x=218  →  U to y=339  →  R to FE left (288, 339).
  y=339 is within FE (281-347) ✓
-->
<path class="dot"
      d="M148 422 L218 422 L218 339 L288 339"
      fill="none" stroke="#3E8EB8" stroke-width="1.3"
      marker-end="url(#a-blue)"/>


<!-- ══════════════════════════════════════════
     RIGHT DATABASE  — Agentic DB
     Dashed enclosure alongside the "try another strategy" rail (x=632).
     DB centre (716, 324)  rx=54  ry=16  body-h=56
     rect x=662 y=308 w=108 h=56
     top-cap cy=308  bot-cap cy=364
     left edge = 662
══════════════════════════════════════════ -->

<!-- Dashed enclosure around Agentic DB -->
<rect x="644" y="282" width="150" height="110" rx="8"
      fill="none" stroke="#ABABAB" stroke-width="1.1" stroke-dasharray="7 4"/>

<!-- Agentic database (coral-red cylinder) -->
<g class="node" filter="url(#sh)">
  <rect x="662" y="308" width="108" height="56" fill="#F07070" stroke="#AE2E2E" stroke-width="1.3"/>
  <ellipse cx="716" cy="364" rx="54" ry="15" fill="#E45A5A" stroke="#AE2E2E" stroke-width="1.3"/>
  <ellipse cx="716" cy="308" rx="54" ry="15" fill="#F58585" stroke="#AE2E2E" stroke-width="1.3"/>
  <text font-family="'Patrick Hand',cursive" font-size="12" font-style="italic" fill="#FFF"
        x="716" y="328" text-anchor="middle" dominant-baseline="central">Agentic</text>
  <text font-family="'Patrick Hand',cursive" font-size="12" font-style="italic" fill="#FFF"
        x="716" y="348" text-anchor="middle" dominant-baseline="central">database</text>
</g>

<!--
  Agentic DB → "try another strategy" rail connection.
  Horizontal dotted line from DB left (662, 336) to rail (632, 336).
  y=336 = centre of DB body (308+28=336).
  The rail runs x=632 from y=220 up to y=556, so y=336 is on it ✓.
-->
<line class="dot" x1="662" y1="336" x2="632" y2="336"
      stroke="#AE2E2E" stroke-width="1.4" marker-end="url(#a-dark)"/>

</svg>
</div>
</body>
</html>
